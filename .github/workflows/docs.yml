name: DocC

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DocC static site
        run: |
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"

          swift package \
            --allow-writing-to-directory ./docs \
            generate-documentation \
            --target Aria2RPC \
            --target SwiftAria \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path "$REPOSITORY_NAME" \
            --output-path ./docs

          cat > ./docs/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=SwiftAria.doccarchive/documentation/swiftaria/">
            <title>SwiftAria Documentation</title>
          </head>
          <body>
            <h1>SwiftAria Documentation</h1>
            <ul>
              <li><a href="SwiftAria.doccarchive/documentation/swiftaria/">SwiftAria</a></li>
              <li><a href="Aria2RPC.doccarchive/documentation/aria2rpc/">Aria2RPC</a></li>
            </ul>
          </body>
          </html>
          HTML

          touch ./docs/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
